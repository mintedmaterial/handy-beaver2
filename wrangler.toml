name = "handy-beaver"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "handy-beaver-db"
database_id = "20a0e8d8-37eb-4445-af1a-3e295d724abd"

# R2 Storage (images)
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "handy-beaver-images"

# Environment Variables
[vars]
ENVIRONMENT = "development"

# Secrets (set via wrangler secret put):
# - GITHUB_CLIENT_ID ✓
# - GITHUB_CLIENT_SECRET ✓
# - ADMIN_API_KEY (for agent API access)
# - DISCORD_WEBHOOK_NOTIFICATIONS (for alerts)
# - OWNER_EMAIL (forward emails to)
# - SQUARE_ACCESS_TOKEN (for payments)
# - GEMINI_API_KEY (for AI visualizer)
# - FACEBOOK_PAGE_ID
# - FACEBOOK_PAGE_ACCESS_TOKEN

# Email routing (requires email routing enabled on domain)
# send_email = [
#   { name = "EMAIL_HANDLER" }
# ]

# Custom domain
routes = [
  { pattern = "handybeaver.co", custom_domain = true },
  { pattern = "www.handybeaver.co", custom_domain = true }
]
