name = "handy-beaver"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Observability - logs and traces
[observability]
enabled = true
head_sampling_rate = 1  # 100% of requests logged

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "handy-beaver-db"
database_id = "20a0e8d8-37eb-4445-af1a-3e295d724abd"

# R2 Storage (images)
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "handy-beaver-images"

# Browser Rendering (for Facebook group scraping)
[browser]
binding = "BROWSER"

# Workers AI (fallback for image generation)
[ai]
binding = "AI"





# Environment Variables
[vars]
ENVIRONMENT = "development"

# Secrets (set via wrangler secret put):
# - GITHUB_CLIENT_ID ✓
# - GITHUB_CLIENT_SECRET ✓
# - ADMIN_API_KEY (for agent API access)
# - DISCORD_WEBHOOK_NOTIFICATIONS (for alerts)
# - OWNER_EMAIL (forward emails to)
# - SQUARE_ACCESS_TOKEN (for payments)
# - GEMINI_API_KEY (for AI visualizer)
# - FACEBOOK_PAGE_ID
# - FACEBOOK_PAGE_ACCESS_TOKEN

# Email routing - send emails from the worker
# Addresses configured in Cloudflare Email Routing:
# - noreply@handybeaver.co (send to worker)
# - portal@handybeaver.co (send to worker)
# - admin@handybeaver.co (send to worker)
send_email = [
  { name = "SEND_EMAIL" }
]

# Cron triggers - Facebook group scan every 30 minutes
[triggers]
crons = ["*/30 * * * *"]

# Custom domain (separate from triggers)
[[routes]]
pattern = "handybeaver.co"
custom_domain = true

[[routes]]
pattern = "www.handybeaver.co"
custom_domain = true
